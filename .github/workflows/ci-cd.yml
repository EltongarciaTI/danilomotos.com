name: CI/CD — Validate & Deploy

on:
  push:
    branches: [main, migration/vps]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 1) VALIDATE — sintaxe JS e HTML dos arquivos do site
  # ============================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JS syntax (assets/js)
        run: |
          for f in assets/js/*.js; do
            echo "→ $f"
            node --input-type=module < "$f" --check 2>/dev/null || node --check "$f"
          done

      - name: Check JS syntax (root dashboard.js)
        run: node --check dashboard.js

      - name: Check HTML structure (basic)
        run: |
          for f in *.html; do
            echo "→ $f"
            python3 -c "
          import html.parser, sys
          class V(html.parser.HTMLParser):
              def __init__(self): super().__init__(); self.stack=[]; self.errors=[]
              def handle_starttag(self,t,a):
                  if t not in ('br','hr','img','input','meta','link','source','area','base','col','embed','param','track','wbr'):
                      self.stack.append(t)
              def handle_endtag(self,t):
                  if self.stack and self.stack[-1]==t: self.stack.pop()
                  elif t in self.stack:
                      self.errors.append(f'tag {t} fechada fora de ordem')
                      self.stack.remove(t)
          v=V()
          with open('$f',encoding='utf-8') as fh: v.feed(fh.read())
          if v.errors: print('ERROS:',v.errors); sys.exit(1)
          print('  OK')
          "
          done

  # ============================================================
  # 2) DEPLOY — SSH na VPS (só main / migration/vps)
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/migration/vps')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://danilomotos.oqay.pro
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy files to VPS
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /home/${{ secrets.SSH_USER }}/danilomotos && git pull origin main"

      - name: Notify status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deploy OK — site atualizado em https://danilomotos.oqay.pro"
          else
            echo "Deploy FALHOU — verifique os logs acima"
            exit 1
          fi
